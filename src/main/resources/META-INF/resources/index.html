<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Elves — GitHub Worker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Outfit', system-ui, sans-serif;
  --radius: 8px;
  --radius-sm: 5px;
  --radius-lg: 12px;
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg-0: #0e1117;
  --bg-1: #161b22;
  --bg-2: #1c2129;
  --bg-3: #242b35;
  --bg-4: #2d3541;
  --bg-surface: #161b22;
  --border: #2a313c;
  --border-bright: #3d4654;
  --text-0: #ecf0f6;
  --text-1: #9ca8b8;
  --text-2: #5d6a7e;
  --accent: #4c8dff;
  --accent-hover: #6ba1ff;
  --accent-subtle: rgba(76,141,255,0.1);
  --green: #3fb950;
  --green-subtle: rgba(63,185,80,0.12);
  --amber: #d29922;
  --amber-subtle: rgba(210,153,34,0.12);
  --red: #f85149;
  --red-subtle: rgba(248,81,73,0.1);
  --cyan: #39d2c0;
  --cyan-subtle: rgba(57,210,192,0.1);
  --purple: #a371f7;
  --purple-subtle: rgba(163,113,247,0.1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --log-bg: #0d1117;
  --toggle-bg: var(--bg-3);
  --toggle-dot: var(--text-1);
}

[data-theme="light"] {
  --bg-0: #f6f8fa;
  --bg-1: #ffffff;
  --bg-2: #f0f3f6;
  --bg-3: #e4e8ee;
  --bg-4: #d8dde5;
  --bg-surface: #ffffff;
  --border: #d1d9e0;
  --border-bright: #b8c1cc;
  --text-0: #1b2028;
  --text-1: #57606a;
  --text-2: #8b949e;
  --accent: #0969da;
  --accent-hover: #0550ae;
  --accent-subtle: rgba(9,105,218,0.08);
  --green: #1a7f37;
  --green-subtle: rgba(26,127,55,0.08);
  --amber: #9a6700;
  --amber-subtle: rgba(154,103,0,0.08);
  --red: #cf222e;
  --red-subtle: rgba(207,34,46,0.07);
  --cyan: #0e8a7e;
  --cyan-subtle: rgba(14,138,126,0.07);
  --purple: #8250df;
  --purple-subtle: rgba(130,80,223,0.07);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --log-bg: #f0f3f6;
  --toggle-bg: var(--bg-3);
  --toggle-dot: var(--text-1);
}

html {
  font-size: 14px;
  transition: background var(--transition);
}

body {
  font-family: var(--sans);
  background: var(--bg-0);
  color: var(--text-0);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition), color var(--transition);
}

/* === HEADER === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background var(--transition), border-color var(--transition);
  box-shadow: var(--shadow-sm);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-sock { font-size: 1.25rem; }

.logo {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-title {
  font-family: var(--sans);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text-0);
  letter-spacing: -0.01em;
}

.logo-sub {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 400;
  color: var(--text-2);
  letter-spacing: 0.04em;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-2);
  transition: background 0.4s;
  position: relative;
  flex-shrink: 0;
}

.status-dot.online { background: var(--green); }
.status-dot.online::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid var(--green);
  opacity: 0.35;
  animation: ping 2.5s ease-out infinite;
}

@keyframes ping {
  0% { transform: scale(1); opacity: 0.35; }
  100% { transform: scale(2); opacity: 0; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* === THEME TOGGLE === */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  margin-right: 6px;
}

.theme-toggle-label {
  font-size: 0.82rem;
  transition: opacity var(--transition);
}

.theme-toggle-label.inactive { opacity: 0.3; }

.theme-toggle-track {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: var(--toggle-bg);
  border: 1px solid var(--border);
  position: relative;
  transition: background var(--transition), border-color var(--transition);
}

.theme-toggle-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--toggle-dot);
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition);
}

[data-theme="light"] .theme-toggle-thumb {
  transform: translateX(16px);
}

/* === BUTTONS === */
.btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-2);
  color: var(--text-1);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-3);
  color: var(--text-0);
  border-color: var(--border-bright);
}

.btn:active { transform: scale(0.97); }

.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}

.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { transform: none; }

.btn-sm { padding: 3px 10px; font-size: 0.7rem; }

/* === LAYOUT === */
.main {
  max-width: 1360px;
  margin: 0 auto;
  padding: 20px 24px 48px;
  display: grid;
  gap: 16px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 960px) { .grid-2 { grid-template-columns: 1fr; } }

/* === PANELS === */
.panel {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: background var(--transition), border-color var(--transition);
  box-shadow: var(--shadow-sm);
  animation: panel-in 0.35s ease-out both;
}

.panel:nth-child(1) { animation-delay: 0.03s; }
.panel:nth-child(2) { animation-delay: 0.06s; }
.panel:nth-child(3) { animation-delay: 0.09s; }
.panel:nth-child(4) { animation-delay: 0.12s; }

@keyframes panel-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.panel-title {
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-0);
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-title-icon {
  font-size: 0.9rem;
  opacity: 0.7;
}

.panel-count {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-subtle);
  padding: 2px 8px;
  border-radius: 99px;
}

/* === TABLES === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.84rem;
}

thead th {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 8px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s, border-color var(--transition);
  cursor: pointer;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--accent-subtle); }
tbody tr.selected { background: var(--accent-subtle); }

td { padding: 9px 14px; vertical-align: middle; }

td a {
  color: var(--accent);
  text-decoration: none;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 500;
}

td a:hover { text-decoration: underline; }

.title-cell {
  max-width: 340px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 400;
}

.time-cell {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-2);
}

/* === STATE BADGES === */
.badge {
  font-family: var(--mono);
  font-size: 0.67rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  letter-spacing: 0.01em;
}

.badge-new          { background: var(--cyan-subtle); color: var(--cyan); }
.badge-approval     { background: var(--amber-subtle); color: var(--amber); }
.badge-coding       { background: var(--purple-subtle); color: var(--purple); }
.badge-reviewing    { background: var(--accent-subtle); color: var(--accent); }
.badge-fixing       { background: var(--amber-subtle); color: var(--amber); }
.badge-ready        { background: var(--green-subtle); color: var(--green); }
.badge-feedback     { background: var(--amber-subtle); color: var(--amber); }
.badge-squashing    { background: var(--purple-subtle); color: var(--purple); }
.badge-ci           { background: var(--accent-subtle); color: var(--accent); }
.badge-ci-fix       { background: var(--red-subtle); color: var(--red); }
.badge-done         { background: var(--green-subtle); color: var(--green); }

/* === FLOW DIAGRAM === */
.flow-row {
  border-bottom: 1px solid var(--border);
  background: var(--bg-0);
  animation: flow-slide 0.2s ease-out;
  transition: background var(--transition), border-color var(--transition);
}

@keyframes flow-slide {
  from { opacity: 0; max-height: 0; }
  to   { opacity: 1; max-height: 100px; }
}

.flow-row td { padding: 12px 14px; }

.flow {
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  padding-bottom: 2px;
}

.flow::-webkit-scrollbar { height: 3px; }
.flow::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.flow-step {
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 400;
  color: var(--text-2);
  padding: 3px 6px;
  border-radius: 3px;
  white-space: nowrap;
  transition: all var(--transition);
}

.flow-step.completed { color: var(--green); opacity: 0.65; }

.flow-step.current {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  border-radius: var(--radius-sm);
}

.flow-arrow {
  color: var(--border-bright);
  font-size: 0.6rem;
  margin: 0 1px;
  flex-shrink: 0;
}

.flow-arrow.completed { color: var(--green); opacity: 0.45; }

/* === LOG TABS === */
.log-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.log-tab {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 500;
  padding: 7px 14px;
  color: var(--text-2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.12s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.log-tab:hover { color: var(--text-0); }

.log-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* === LOGS === */
.log-area {
  font-family: var(--mono);
  font-size: 0.74rem;
  line-height: 1.65;
  color: var(--text-1);
  background: var(--log-bg);
  padding: 12px 16px;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
  transition: background var(--transition), color var(--transition);
}

.log-area::-webkit-scrollbar { width: 5px; }
.log-area::-webkit-scrollbar-track { background: transparent; }
.log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.log-area .log-line { display: block; border-radius: 2px; padding: 0 2px; }
.log-area .log-line:hover { background: var(--accent-subtle); }

/* === CONFIG === */
.config-grid { display: grid; gap: 0; }

.config-row {
  display: grid;
  grid-template-columns: 190px 1fr;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s, border-color var(--transition);
}

.config-row:last-child { border-bottom: none; }
.config-row:hover { background: var(--accent-subtle); }

.config-key {
  font-family: var(--mono);
  font-size: 0.74rem;
  font-weight: 500;
  color: var(--text-2);
  padding: 7px 14px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
  transition: border-color var(--transition);
}

.config-val { padding: 3px 6px; display: flex; align-items: center; }

.config-val input {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-0);
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s, background 0.15s, color var(--transition);
}

.config-val input:focus {
  border-color: var(--accent);
  background: var(--bg-0);
}

.config-val input.secret { color: var(--text-2); }

.config-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
}

.config-toggle-track {
  width: 32px;
  height: 18px;
  border-radius: 9px;
  background: var(--bg-4);
  border: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}

.config-toggle-track.on {
  background: var(--green-subtle);
  border-color: var(--green);
}

.config-toggle-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text-2);
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform 0.2s, background 0.2s;
}

.config-toggle-track.on .config-toggle-thumb {
  transform: translateX(14px);
  background: var(--green);
}

.config-toggle-label {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-2);
}

/* === ACTION BUTTONS === */
.row-actions {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
}

.row-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-2);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}

.row-btn:hover {
  background: var(--bg-3);
  color: var(--text-0);
  border-color: var(--border-bright);
}

.row-btn.retry:hover { border-color: var(--amber); color: var(--amber); }
.row-btn.remove:hover { border-color: var(--red); color: var(--red); }

/* === DISCOVERY PANEL === */
.panel-collapse {
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text-2);
  background: none;
  border: none;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  transition: color 0.12s;
  font-family: var(--mono);
}

.panel-collapse:hover { color: var(--text-0); }

.panel-body.collapsed { display: none; }

.discovery-actions {
  display: flex;
  gap: 4px;
}

.discovery-btn {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-2);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.12s;
  font-family: var(--mono);
}

.discovery-btn:hover {
  color: var(--text-0);
  border-color: var(--border-bright);
  background: var(--bg-3);
}

.discovery-btn.eyes:hover { border-color: var(--cyan); color: var(--cyan); }
.discovery-btn.assign:hover { border-color: var(--green); color: var(--green); }

.badge-issue { background: var(--green-subtle); color: var(--green); }
.badge-pr { background: var(--purple-subtle); color: var(--purple); }
.badge-mention { background: var(--accent-subtle); color: var(--accent); }
.badge-topic { background: var(--amber-subtle); color: var(--amber); }

/* === EMPTY STATE === */
.empty {
  text-align: center;
  padding: 28px 20px;
  color: var(--text-2);
  font-size: 0.85rem;
}

.empty-icon {
  font-size: 1.3rem;
  margin-bottom: 6px;
  opacity: 0.5;
}

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 8px 16px;
  border-radius: var(--radius);
  background: var(--bg-3);
  border: 1px solid var(--border-bright);
  color: var(--text-0);
  transform: translateY(70px);
  opacity: 0;
  transition: all 0.25s ease-out, background var(--transition);
  z-index: 200;
  box-shadow: var(--shadow-md);
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); }
.toast.error   { border-color: var(--red); }

/* === FOOTER === */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 0.75rem;
  color: var(--text-2);
  letter-spacing: 0.01em;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="logo-sock">🧦</span>
    <div class="logo">
      <span class="logo-title">House Elves</span>
      <span class="logo-sub">github worker</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <span class="theme-toggle-label" id="moonIcon">🌙</span>
      <div class="theme-toggle-track">
        <div class="theme-toggle-thumb"></div>
      </div>
      <span class="theme-toggle-label" id="sunIcon">☀️</span>
    </div>
    <button class="btn" id="btnPreview" onclick="runPreview()">preview</button>
    <button class="btn primary" id="btnTrigger" onclick="runTrigger()">trigger now</button>
  </div>
</header>

<main class="main">
  <div class="panel" id="discoveryPanel" style="display:none;">
    <div class="panel-head">
      <div class="panel-title"><span class="panel-title-icon">🔍</span> Discover</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="panel-count" id="discoveryCount">0</div>
        <button class="panel-collapse" id="discoveryToggle" onclick="toggleDiscovery()">▼</button>
      </div>
    </div>
    <div class="panel-body" id="discoveryBody">
      <table>
        <thead><tr><th>Item</th><th>Title</th><th>Type</th><th>Source</th><th></th></tr></thead>
        <tbody id="discoveryTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="panel-title"><span class="panel-title-icon">⚡</span> Issues</div>
      <div class="panel-count" id="issueCount">0</div>
    </div>
    <div class="panel-body">
      <table>
        <thead><tr><th>Issue</th><th>Title</th><th>State</th><th>PR</th><th>Updated</th><th></th></tr></thead>
        <tbody id="issueBody"></tbody>
      </table>
      <div class="empty" id="issueEmpty">
        <div class="empty-icon">🧦</div>
        No tasks assigned — the elf is idle
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="panel-title"><span class="panel-title-icon">📋</span> Reviews</div>
      <div class="panel-count" id="reviewCount">0</div>
    </div>
    <div class="panel-body">
      <table>
        <thead><tr><th>PR</th><th>Title</th><th>State</th><th>Updated</th><th></th></tr></thead>
        <tbody id="reviewBody"></tbody>
      </table>
      <div class="empty" id="reviewEmpty">
        <div class="empty-icon">📋</div>
        No reviews pending — all scrolls examined
      </div>
    </div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><span class="panel-title-icon">🖥</span> Logs</div>
        <button class="btn btn-sm" onclick="fetchCurrentLog()">refresh</button>
      </div>
      <div class="panel-body">
        <div class="log-tabs">
          <button class="log-tab active" id="tabWorker" onclick="switchLogTab('worker')">Worker</button>
          <button class="log-tab" id="tabClaude" onclick="switchLogTab('claude')">Claude</button>
        </div>
        <div class="log-area" id="logArea">Loading logs...</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><span class="panel-title-icon">⚙️</span> Config</div>
        <button class="btn btn-sm" onclick="saveConfig()">save</button>
      </div>
      <div class="panel-body">
        <div class="config-grid" id="configGrid">
          <div class="empty" id="configEmpty">Loading config...</div>
        </div>
      </div>
    </div>
  </div>
</main>


<div class="toast" id="toast"></div>

<script>
// === THEME ===
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('house-elves-theme', theme);
  document.getElementById('moonIcon').className = 'theme-toggle-label' + (theme === 'dark' ? '' : ' inactive');
  document.getElementById('sunIcon').className = 'theme-toggle-label' + (theme === 'light' ? '' : ' inactive');
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
}

setTheme(localStorage.getItem('house-elves-theme') || 'dark');

// === STATE ===
const ISSUE_STATES = [
  'NEW','AWAITING_APPROVAL','CODING','SELF_REVIEWING','FIXING_REVIEW',
  'READY_FOR_REVIEW','ADDRESSING_FEEDBACK','SQUASHING','MONITORING_CI','FIXING_CI','DONE'
];

const SECRET_KEYS = new Set(['GITHUB_TOKEN','BOT_TOKEN','GMAIL_APP_PASSWORD']);

let selectedIssue = null;
let currentState = { issues: {}, reviews: {} };

function badgeClass(state) {
  const map = {
    NEW: 'badge-new', AWAITING_APPROVAL: 'badge-approval', CODING: 'badge-coding',
    SELF_REVIEWING: 'badge-reviewing', FIXING_REVIEW: 'badge-fixing',
    READY_FOR_REVIEW: 'badge-ready', ADDRESSING_FEEDBACK: 'badge-feedback',
    SQUASHING: 'badge-squashing', MONITORING_CI: 'badge-ci',
    FIXING_CI: 'badge-ci-fix', DONE: 'badge-done', REVIEW_POSTED: 'badge-reviewing'
  };
  return map[state] || 'badge-new';
}

function shortState(state) {
  const map = {
    AWAITING_APPROVAL: 'APPROVAL', SELF_REVIEWING: 'SELF_REVIEW',
    FIXING_REVIEW: 'FIX_REVIEW', READY_FOR_REVIEW: 'READY',
    ADDRESSING_FEEDBACK: 'FEEDBACK', MONITORING_CI: 'CI_WATCH',
    FIXING_CI: 'CI_FIX', REVIEW_POSTED: 'POSTED'
  };
  return map[state] || state;
}

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function issueUrl(ownerRepo, num) { return 'https://github.com/' + ownerRepo + '/issues/' + num; }
function prUrl(ownerRepo, num) { return 'https://github.com/' + ownerRepo + '/pull/' + num; }

function renderIssues(issues) {
  const tbody = document.getElementById('issueBody');
  const empty = document.getElementById('issueEmpty');
  const count = document.getElementById('issueCount');
  const keys = Object.keys(issues);
  count.textContent = keys.length;
  if (keys.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  let html = '';
  for (const key of keys) {
    const iss = issues[key];
    const isSel = selectedIssue === key;
    html += '<tr class="' + (isSel ? 'selected' : '') + '" onclick="toggleIssue(\'' + key + '\')">';
    html += '<td><a href="' + issueUrl(iss.ownerRepo, iss.issueNumber) + '" target="_blank" onclick="event.stopPropagation()">' + key + '</a></td>';
    html += '<td class="title-cell">' + esc(iss.title || '') + '</td>';
    html += '<td><span class="badge ' + badgeClass(iss.state) + '">' + shortState(iss.state) + '</span></td>';
    html += iss.prUrl
      ? '<td><a href="' + iss.prUrl + '" target="_blank" onclick="event.stopPropagation()">#' + (iss.prNumber || '?') + '</a></td>'
      : '<td style="color:var(--text-2)">—</td>';
    html += '<td class="time-cell">' + timeAgo(iss.lastUpdated) + '</td>';
    html += '<td><div class="row-actions">'
          + '<button class="row-btn retry" onclick="event.stopPropagation();retryItem(\'' + key + '\')" title="Retry">↻</button>'
          + '<button class="row-btn remove" onclick="event.stopPropagation();removeItem(\'' + key + '\')" title="Remove">✕</button>'
          + '</div></td></tr>';
    if (isSel) html += '<tr class="flow-row"><td colspan="6">' + renderFlow(iss.state, ISSUE_STATES) + '</td></tr>';
  }
  tbody.innerHTML = html;
}

function renderReviews(reviews) {
  const tbody = document.getElementById('reviewBody');
  const empty = document.getElementById('reviewEmpty');
  const count = document.getElementById('reviewCount');
  const keys = Object.keys(reviews);
  count.textContent = keys.length;
  if (keys.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  let html = '';
  for (const key of keys) {
    const rev = reviews[key];
    html += '<tr>';
    html += '<td><a href="' + prUrl(rev.ownerRepo, rev.prNumber) + '" target="_blank">' + key + '</a></td>';
    html += '<td class="title-cell">' + esc(rev.title || '') + '</td>';
    html += '<td><span class="badge ' + badgeClass(rev.state) + '">' + shortState(rev.state) + '</span></td>';
    html += '<td class="time-cell">' + timeAgo(rev.lastUpdated) + '</td>';
    html += '<td><div class="row-actions">'
          + '<button class="row-btn retry" onclick="event.stopPropagation();retryItem(\'' + key + '\')" title="Retry">↻</button>'
          + '<button class="row-btn remove" onclick="event.stopPropagation();removeItem(\'' + key + '\')" title="Remove">✕</button>'
          + '</div></td></tr>';
  }
  tbody.innerHTML = html;
}

function renderFlow(current, states) {
  let html = '<div class="flow">';
  const idx = states.indexOf(current);
  for (let i = 0; i < states.length; i++) {
    if (i > 0) html += '<span class="flow-arrow ' + (i <= idx ? 'completed' : '') + '">›</span>';
    let cls = 'flow-step';
    if (i < idx) cls += ' completed';
    if (i === idx) cls += ' current';
    html += '<span class="' + cls + '">' + shortState(states[i]) + '</span>';
  }
  return html + '</div>';
}

function toggleIssue(key) {
  selectedIssue = selectedIssue === key ? null : key;
  renderIssues(currentState.issues);
}

function updateState(data) {
  currentState = data;
  renderIssues(data.issues || {});
  renderReviews(data.reviews || {});
  renderDiscoveries(data.discoveries || {});
  const hasActive = Object.values(data.issues || {}).some(i => i.state !== 'DONE')
                 || Object.values(data.reviews || {}).some(r => r.state !== 'DONE');
  document.getElementById('statusDot').className = 'status-dot' + (hasActive ? ' online' : '');
}

function renderDiscoveries(discoveries) {
  const panel = document.getElementById('discoveryPanel');
  const tbody = document.getElementById('discoveryTableBody');
  const count = document.getElementById('discoveryCount');
  const keys = Object.keys(discoveries);
  count.textContent = keys.length;

  if (keys.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = '';

  let html = '';
  for (const key of keys) {
    const d = discoveries[key];
    const itemUrl = d.url || ('https://github.com/' + d.ownerRepo + '/' + (d.type === 'pr' ? 'pull' : 'issues') + '/' + d.number);
    html += '<tr>';
    html += '<td><a href="' + itemUrl + '" target="_blank">' + key + '</a></td>';
    html += '<td class="title-cell">' + esc(d.title || '') + '</td>';
    html += '<td><span class="badge ' + (d.type === 'pr' ? 'badge-pr' : 'badge-issue') + '">' + (d.type || 'issue') + '</span></td>';
    html += '<td><span class="badge ' + (d.source === 'mention' ? 'badge-mention' : 'badge-topic') + '">' + esc(d.source || '') + '</span></td>';
    html += '<td><div class="discovery-actions">';
    html += '<button class="discovery-btn eyes" onclick="addEyes(\'' + d.ownerRepo + '\',' + d.number + ')" title="Add 👀 reaction">👀</button>';
    if (d.type !== 'pr') {
      html += '<button class="discovery-btn assign" onclick="selfAssign(\'' + d.ownerRepo + '\',' + d.number + ')" title="Self-assign">assign</button>';
    }
    html += '</div></td></tr>';
  }
  tbody.innerHTML = html;
}

function toggleDiscovery() {
  const body = document.getElementById('discoveryBody');
  const toggle = document.getElementById('discoveryToggle');
  const collapsed = body.classList.toggle('collapsed');
  toggle.textContent = collapsed ? '▶' : '▼';
  localStorage.setItem('discovery-collapsed', collapsed);
}

// Restore collapse state
if (localStorage.getItem('discovery-collapsed') === 'true') {
  document.getElementById('discoveryBody').classList.add('collapsed');
  document.getElementById('discoveryToggle').textContent = '▶';
}

async function addEyes(ownerRepo, number) {
  const [owner, repo] = ownerRepo.split('/');
  try {
    const res = await fetch('/api/react/' + owner + '/' + repo + '/' + number, { method: 'POST' });
    const data = await res.json();
    if (res.ok) toast('👀 added to ' + ownerRepo + '#' + number, 'success');
    else toast('Failed: ' + (data.error || ''), 'error');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function selfAssign(ownerRepo, number) {
  const [owner, repo] = ownerRepo.split('/');
  try {
    const res = await fetch('/api/assign/' + owner + '/' + repo + '/' + number, { method: 'POST' });
    const data = await res.json();
    if (res.ok) toast('Assigned ' + ownerRepo + '#' + number, 'success');
    else toast('Failed: ' + (data.error || ''), 'error');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

// === CONFIG ===
function renderConfig(config) {
  const grid = document.getElementById('configGrid');
  const empty = document.getElementById('configEmpty');
  const keys = Object.keys(config);
  if (keys.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  let html = '';
  for (const key of keys) {
    const val = config[key];
    const isSecret = SECRET_KEYS.has(key);
    const isBool = val === 'true' || val === 'false';
    html += '<div class="config-row"><div class="config-key">' + key + '</div>';
    if (isBool) {
      const on = val === 'true';
      html += '<div class="config-val"><div class="config-toggle">'
            + '<div class="config-toggle-track' + (on ? ' on' : '') + '" data-key="' + key + '" onclick="toggleConfigBool(this)">'
            + '<div class="config-toggle-thumb"></div></div>'
            + '<span class="config-toggle-label">' + (on ? 'on' : 'off') + '</span>'
            + '</div></div>';
    } else {
      html += '<div class="config-val"><input type="' + (isSecret ? 'password' : 'text') + '"'
            + ' class="' + (isSecret ? 'secret' : '') + '" data-key="' + key + '"'
            + ' value="' + esc(val) + '"></div>';
    }
    html += '</div>';
  }
  grid.innerHTML = html;
}

function toggleConfigBool(track) {
  const on = track.classList.toggle('on');
  track.nextElementSibling.textContent = on ? 'on' : 'off';
}

async function saveConfig() {
  const updates = {};
  document.querySelectorAll('.config-val input').forEach(inp => {
    updates[inp.dataset.key] = inp.value;
  });
  document.querySelectorAll('.config-toggle-track').forEach(track => {
    updates[track.dataset.key] = track.classList.contains('on') ? 'true' : 'false';
  });
  try {
    const res = await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) });
    toast(res.ok ? 'Config saved' : 'Save failed', res.ok ? 'success' : 'error');
  } catch (e) { toast('Save failed: ' + e.message, 'error'); }
}

// === LOGS ===
let currentLogTab = 'worker';

function switchLogTab(tab) {
  currentLogTab = tab;
  document.getElementById('tabWorker').className = 'log-tab' + (tab === 'worker' ? ' active' : '');
  document.getElementById('tabClaude').className = 'log-tab' + (tab === 'claude' ? ' active' : '');
  fetchCurrentLog();
}

function fetchCurrentLog() {
  if (currentLogTab === 'claude') fetchClaudeLogs();
  else fetchLogs();
}

async function fetchLogs() {
  try {
    const res = await fetch('/api/logs?lines=100');
    const data = await res.json();
    renderLogArea(data);
  } catch (e) { document.getElementById('logArea').textContent = 'Failed: ' + e.message; }
}

async function fetchClaudeLogs() {
  try {
    const res = await fetch('/api/logs/claude?lines=50');
    const data = await res.json();
    renderLogArea(data);
  } catch (e) { document.getElementById('logArea').textContent = 'Failed: ' + e.message; }
}

function renderLogArea(data) {
  const area = document.getElementById('logArea');
  if (data.logs) {
    const lines = data.logs.split('\n').filter(Boolean);
    area.innerHTML = lines.map(l => '<span class="log-line">' + esc(l) + '</span>').join('\n');
    area.scrollTop = area.scrollHeight;
  } else { area.textContent = data.error || 'No logs available'; }
}

// === ACTIONS ===
async function runTrigger() {
  const btn = document.getElementById('btnTrigger');
  btn.disabled = true; btn.textContent = 'working...';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    const data = await res.json();
    toast('Elf dispatched (pid: ' + data.pid + ')', 'success');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'trigger now'; }
}

async function runPreview() {
  const btn = document.getElementById('btnPreview');
  btn.disabled = true; btn.textContent = 'scanning...';
  try {
    const res = await fetch('/api/preview', { method: 'POST' });
    const data = await res.json();
    renderLogArea({ logs: data.output || data.error || '' });
    toast('Preview complete', 'success');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'preview'; }
}

// === STATE ACTIONS ===
function encodeKey(key) {
  // Convert "owner/repo#123" to "owner_repo#123" for the URL path
  return key.replace('/', '_');
}

async function retryItem(key) {
  try {
    const res = await fetch('/api/state/' + encodeURIComponent(encodeKey(key)) + '/retry', { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      toast('Reset ' + key + ': ' + data.from + ' → ' + data.to, 'success');
      const stateRes = await fetch('/api/state');
      updateState(await stateRes.json());
    } else {
      toast('Retry failed: ' + (data.error || ''), 'error');
    }
  } catch (e) { toast('Retry failed: ' + e.message, 'error'); }
}

async function removeItem(key) {
  try {
    const res = await fetch('/api/state/' + encodeURIComponent(encodeKey(key)), { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) {
      toast('Removed ' + key, 'success');
      const stateRes = await fetch('/api/state');
      updateState(await stateRes.json());
    } else {
      toast('Remove failed: ' + (data.error || ''), 'error');
    }
  } catch (e) { toast('Remove failed: ' + e.message, 'error'); }
}

// === WEBSOCKET ===
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(proto + '//' + location.host + '/api/live');
  ws.onmessage = evt => {
    try {
      const d = JSON.parse(evt.data);
      if (!d.error) updateState(d);
    } catch(e) { console.error('WebSocket parse error:', e, evt.data?.substring(0, 200)); }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => ws.close();
}

// === HELPERS ===
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// === INIT ===
async function init() {
  try {
    const [stateRes, configRes] = await Promise.all([fetch('/api/state'), fetch('/api/config')]);
    updateState(await stateRes.json());
    renderConfig(await configRes.json());
  } catch (e) { console.error('Init failed:', e); }
  fetchLogs();
  connectWS();
}

init();
</script>
</body>
</html>
